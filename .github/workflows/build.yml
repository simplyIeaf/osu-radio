name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools

      - name: Install Android SDK platform and build tools
        run: |
          rm -rf $ANDROID_HOME/platforms/android-35
          rm -rf $ANDROID_HOME/build-tools/35.0.0
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(grep VERSION_NAME version.properties | cut -d'=' -f2)
          APP_VERSION=$(grep APP_VERSION version.properties | cut -d'=' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-radio-debug-${{ steps.version.outputs.app_version }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create full zip archive
        run: |
          zip -r osu-radio-full-${{ steps.version.outputs.app_version }}.zip . \
            --exclude "*.git/*" \
            --exclude "*/build/*" \
            --exclude "*/.gradle/*"

      - name: Upload full zip
        uses: actions/upload-artifact@v4
        with:
          name: osu-radio-full-zip-${{ steps.version.outputs.app_version }}
          path: osu-radio-full-${{ steps.version.outputs.app_version }}.zip
          retention-days: 30
